services:
  - type: web
    name: finsight-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    branch: main

    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: WARNING
      - key: APP_VERSION
        value: "0.1.0"
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-5        # ← FIXED: was claude-sonnet-4-6 (invalid)
      - key: MAX_TOKENS
        value: "1024"                   # ← FIXED: was 2048, 1024 is 2x faster
      - key: CORS_ALLOWED_ORIGINS
        value: https://finsight-topaz-beta.vercel.app
      - key: FAISS_INDEX_PATH
        value: /tmp/finsight_faiss
      - key: CHUNK_SIZE
        value: "800"
      - key: CHUNK_OVERLAP
        value: "100"
      - key: TOP_K_RESULTS
        value: "5"
      - key: YFINANCE_CACHE_TTL
        value: "600"
      - key: YFINANCE_MAX_RETRIES
        value: "3"
      - key: YFINANCE_TIMEOUT
        value: "10.0"
